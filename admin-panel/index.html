<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Admin Panel - Token Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #3182ce;
      --danger: #f85149;
      --success: #2ea043;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    th {
      color: var(--text-muted);
      font-weight: 600;
    }
    .badge {
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge.active { background: rgba(46, 160, 67, 0.2); color: var(--success); }
    .badge.disabled { background: rgba(248, 81, 73, 0.2); color: var(--danger); }
    .badge.revoked { background: rgba(139, 148, 158, 0.2); color: var(--text-muted); }
    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: 0.2s;
    }
    button:hover { background: var(--accent-hover); }
    button.danger { background: var(--danger); }
    button.danger:hover { background: #d73a49; }
    input, select {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-main);
      color: var(--text-main);
      margin-right: 10px;
    }
    .form-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .login-overlay {
      position: fixed; inset: 0; background: var(--bg-main);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .login-box {
      background: var(--bg-card); padding: 40px; border-radius: 8px; border: 1px solid var(--border);
      text-align: center; width: 300px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="login-overlay" class="login-overlay">
    <div class="login-box">
      <h2>Admin Login</h2>
      <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 20px;">Connected to: <span id="api-status">Checking...</span></p>
      <input type="password" id="admin-secret" placeholder="Admin Secret Key" style="width: 100%; box-sizing: border-box; margin: 20px 0;">
      <button onclick="loginAdmin()" style="width: 100%;">Login</button>
      <p id="login-error" style="color: var(--danger); margin-top: 10px; font-size: 14px;"></p>
    </div>
  </div>

  <div class="container hidden" id="admin-content">
    <div class="header">
      <h2>🔑 Token Management</h2>
      <button onclick="logoutAdmin()">Logout</button>
    </div>

    <div class="card">
      <h3>Generate New Token</h3>
      <div class="form-group">
        <label>Validity (Days):</label>
        <input type="number" id="expiry-days" value="30" min="1">
        <button onclick="generateToken()">Generate Token</button>
      </div>
    </div>

    <div class="card">
      <h3>All Tokens</h3>
      <table>
        <thead>
          <tr>
            <th>Token String</th>
            <th>Status</th>
            <th>Created At</th>
            <th>Expires At</th>
            <th>Days Left</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tokens-list">
          <!-- Tokens will be populated here -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    // Configuration: Point to your backend API URL
    // Automatically detects if running locally or on production
    const API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:3000'
      : window.location.origin;
    
    // Check API connection
    fetch(`${API_BASE_URL}/api/health`)
      .then(() => document.getElementById('api-status').textContent = API_BASE_URL)
      .catch(() => {
        document.getElementById('api-status').textContent = 'OFFLINE';
        document.getElementById('api-status').style.color = 'var(--danger)';
      });
  </script>
  <script src="js/admin.js"></script>
</body>
</html>
